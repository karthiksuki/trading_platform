services:
  backend:
    build:
      context: ./backend
    environment:
      TRADING_DB_PATH: /data/trading.db
      MARKET_DATA_SOURCE: polymarket
      TRADING_ENCRYPTION_KEY: ${TRADING_ENCRYPTION_KEY:-change-this-before-production}
    volumes:
      - trading_data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  trading_data:
